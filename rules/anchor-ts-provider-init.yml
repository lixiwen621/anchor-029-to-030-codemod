id: anchor-ts-auto-accounts-system-program
language: TypeScript
severity: warning
message: "Anchor 0.30: Standard system accounts are now auto-resolved. Remove them from `.accounts()`."
note: |
  In Anchor 0.30, systemProgram, clock, rent, and tokenProgram are
  auto-resolved by the framework. Remove these from explicit `.accounts()` calls.
rule:
  any:
    - pattern: '$_.accounts({systemProgram: $_})'
    - pattern: '$_.accounts({systemProgram: $_, $$$AFTER})'
    - pattern: '$_.accounts({$$$BEFORE, systemProgram: $_})'
    - pattern: '$_.accounts({$$$BEFORE, systemProgram: $_, $$$AFTER})'

---

