id: anchor-ts-provider-two-args
language: TypeScript
severity: warning
message: "Anchor 0.30: `AnchorProvider` constructor now takes 2 args instead of 3. Remove the options object."
note: |
  In Anchor 0.30, `new AnchorProvider(connection, wallet, {})` becomes `new AnchorProvider(connection, wallet)`.
  The third options argument is removed.
rule:
  pattern: new AnchorProvider($CONN, $WALLET, {})
fix: new AnchorProvider($CONN, $WALLET)

---

id: anchor-ts-program-id-arg-programId
language: TypeScript
severity: warning
message: "Anchor 0.30: `Program` constructor no longer accepts explicit programId argument."
note: |
  In Anchor 0.30, `new Program(idl, programId)` becomes `new Program(idl)`.
  The program ID is now derived from the IDL.
rule:
  pattern: new Program($IDL, programId)
fix: new Program($IDL)

---

id: anchor-ts-program-id-arg-PROGRAM_ID
language: TypeScript
severity: warning
message: "Anchor 0.30: `Program` constructor no longer accepts explicit programId argument."
note: |
  In Anchor 0.30, `new Program(idl, PROGRAM_ID)` becomes `new Program(idl)`.
  Keep this rule strict to avoid false positives on other valid second arguments.
rule:
  pattern: new Program($IDL, PROGRAM_ID)
fix: new Program($IDL)

---

id: anchor-ts-program-id-arg-programId-provider
language: TypeScript
severity: warning
message: "Anchor 0.30: `Program` constructor no longer accepts explicit programId argument."
note: |
  In Anchor 0.30, `new Program(idl, programId, provider)` becomes `new Program(idl, provider)`.
  Keep this rule strict to avoid false positives on arbitrary argument forms.
rule:
  pattern: new Program($IDL, programId, $PROVIDER)
fix: new Program($IDL, $PROVIDER)

